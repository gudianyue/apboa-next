# ============================================================
# Docker 环境配置（spring.profiles.active=docker）
# 所有值均从环境变量读取，由 docker-compose 注入
# ============================================================

server:
  port: 3064

spring:
  application:
    name: websocket
  main:
    banner-mode: off
  data:
    redis:
      host: ${REDIS_HOST:apboa-redis}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:redis}
      database: ${REDIS_DATABASE:7}
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
          max-wait: -1ms

logging:
  level:
    root: WARN
    com.hxh.apboa.websocket: INFO

jwt:
  secret: ${JWT_SECRET:ZJr8c2xF0y5b7yM+1H9v9cGZq6nZ5e0k5r3Cw7H8vJQ=}

# WebSocket 心跳上报配置
heartbeat:
  enabled: true
  console-url: http://${CONSOLE_HOST:apboa-console}:3060
  interval-seconds: 30
