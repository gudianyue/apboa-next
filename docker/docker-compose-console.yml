# ============================================================
# Apboa 生产部署 - 控制台节点（docker-compose-console.yml）
# 部署位置：控制台服务器（Server 1），单节点部署
# 使用方式：docker compose -f docker-compose-console.yml up -d --build
# ============================================================

services:
  # ==================== 管理控制台（runner-console） ====================
  apboa-console:
    build:
      context: ..
      dockerfile: docker/console/Dockerfile
      args:
        MAVEN_IMAGE: ${DOCKER_REGISTRY}maven:3.9-eclipse-temurin-21
        JRE_IMAGE: ${DOCKER_REGISTRY}eclipse-temurin:21-jre
    container_name: apboa-console
    restart: unless-stopped
    cap_drop:
      - ALL
    cap_add:
      - SETUID
      - SETGID
      - CHOWN
    security_opt:
      - no-new-privileges:true
    mem_limit: ${CONSOLE_MEM_LIMIT:-4g}
    cpus: ${CONSOLE_CPU_LIMIT:-4}
    environment:
      SPRING_PROFILES_ACTIVE: docker
      MYSQL_HOST: ${MYSQL_HOST}
      MYSQL_PORT: ${MYSQL_PORT}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      REDIS_DATABASE: ${REDIS_DATABASE}
      JWT_SECRET: ${JWT_SECRET}
      CONSOLE_JAVA_HEAP_PERCENTAGE: ${CONSOLE_JAVA_HEAP_PERCENTAGE:-75.0}
      WEBSOCKET_ENABLED: ${WEBSOCKET_ENABLED:-true}
      WEBSOCKET_HOST: ${WEBSOCKET_HOST:-apboa-websocket}
      WEBSOCKET_PORT: ${WEBSOCKET_PORT:-3064}
      TZ: Asia/Shanghai
    volumes:
      - ${LOG_PATH:-./logs}/console:/app/logs
      - ${DATA_PATH:-./data}/.apboa:/app/.apboa
    ports:
      - "3060:3060"
    networks:
      - apboa_console

  # ==================== WebSocket 推送服务（runner-websocket） ====================
  apboa-websocket:
    build:
      context: ..
      dockerfile: docker/websocket/Dockerfile
      args:
        MAVEN_IMAGE: ${DOCKER_REGISTRY}maven:3.9-eclipse-temurin-21
        JRE_IMAGE: ${DOCKER_REGISTRY}eclipse-temurin:21-jre
    container_name: apboa-websocket
    restart: unless-stopped
    mem_limit: ${WEBSOCKET_MEM_LIMIT:-1g}
    cpus: ${WEBSOCKET_CPU_LIMIT:-2}
    environment:
      SPRING_PROFILES_ACTIVE: docker
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      REDIS_DATABASE: ${REDIS_DATABASE}
      CONSOLE_HOST: ${CONSOLE_HOST:-apboa-console}
      WEBSOCKET_JAVA_HEAP_PERCENTAGE: ${WEBSOCKET_JAVA_HEAP_PERCENTAGE:-50.0}
      TZ: Asia/Shanghai
    ports:
      - "${WEBSOCKET_PORT:-3064}:3064"
    networks:
      - apboa_console

  # ==================== 前端（Nginx） ====================
  apboa-frontend:
    build:
      context: ..
      dockerfile: docker/frontend/Dockerfile
      args:
        NODE_IMAGE: ${DOCKER_REGISTRY}node:22
        NGINX_IMAGE: ${DOCKER_REGISTRY}nginx:alpine
        VITE_APP_BASE_API: ${VITE_APP_BASE_API}
        VITE_APP_CONTEXT_PATH: ${VITE_APP_CONTEXT_PATH}
    container_name: apboa-frontend
    restart: unless-stopped
    # 生产模式下 Nginx 需要知道 runtime 的地址（跨服务器）
    # 使用 envsubst 在启动时替换 nginx.conf 中的变量
    environment:
      RUNTIME_HOST: ${RUNTIME_HOST:-apboa-runtime}
      RUNTIME_PORT: ${RUNTIME_PORT:-3061}
      WEBSOCKET_HOST: ${WEBSOCKET_HOST:-apboa-websocket}
      WEBSOCKET_PORT: ${WEBSOCKET_PORT:-3064}
    entrypoint: >
      /bin/sh -c "
        envsubst '$$RUNTIME_HOST $$RUNTIME_PORT $$WEBSOCKET_HOST $$WEBSOCKET_PORT' < /etc/nginx/conf.d/default.conf > /etc/nginx/conf.d/default.conf.tmp &&
        mv /etc/nginx/conf.d/default.conf.tmp /etc/nginx/conf.d/default.conf &&
        nginx -g 'daemon off;'
      "
    volumes:
      - ${LOG_PATH:-./logs}/frontend:/var/log/nginx
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      - apboa-console
    networks:
      - apboa_console

networks:
  apboa_console:
    name: apboa_console
    driver: bridge
