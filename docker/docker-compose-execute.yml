# ============================================================
# Apboa 生产部署 - 执行节点（docker-compose-execute.yml）
# 部署位置：执行节点服务器（Server 2+），可多实例部署
# 使用方式：bash start-execute.sh 或 docker compose -f docker-compose-execute.yml up -d --build
# ============================================================

services:
  # ==================== AI 运行时（runner-runtime） ====================
  apboa-runtime:
    build:
      context: ..
      dockerfile: docker/runtime/Dockerfile
      args:
        MAVEN_IMAGE: ${DOCKER_REGISTRY}maven:3.9-eclipse-temurin-21
        JRE_IMAGE: ${DOCKER_REGISTRY}eclipse-temurin:21-jre
    container_name: apboa-runtime
    restart: unless-stopped
    cap_drop:
      - ALL
    cap_add:
      - SETUID
      - SETGID
      - CHOWN
    security_opt:
      - no-new-privileges:true
    mem_limit: ${RUNTIME_MEM_LIMIT:-8g}
    cpus: ${RUNTIME_CPU_LIMIT:-8}
    environment:
      SPRING_PROFILES_ACTIVE: docker
      MYSQL_HOST: ${MYSQL_HOST}
      MYSQL_PORT: ${MYSQL_PORT}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      REDIS_DATABASE: ${REDIS_DATABASE}
      JWT_SECRET: ${JWT_SECRET}
      VECTOR_STORE_TYPE: ${VECTOR_STORE_TYPE}
      PG_HOST: ${PG_HOST}
      PG_PORT: ${PG_PORT}
      PG_DATABASE: ${PG_DATABASE}
      PG_USER: ${PG_USER}
      PG_PASSWORD: ${PG_PASSWORD}
      SHELL_PROXY_ENABLED: "true"
      PROXY_HOST: apboa-proxy
      PROXY_PORT: "3062"
      CONSOLE_HOST: ${CONSOLE_HOST}
      RUNTIME_JAVA_HEAP_PERCENTAGE: ${RUNTIME_JAVA_HEAP_PERCENTAGE:-75.0}
      WEBSOCKET_ENABLED: ${WEBSOCKET_ENABLED:-true}
      WEBSOCKET_HOST: ${WEBSOCKET_HOST:-apboa-websocket}
      WEBSOCKET_PORT: ${WEBSOCKET_PORT:-3064}
      WORKSPACE_CAPACITY_MB: ${WORKSPACE_CAPACITY_MB:-30}
      # 心跳标识：由 start-execute.sh 自动注入，同一节点的三个服务必须相同
      APBOA_NODE_ID: ${APBOA_NODE_ID}
      APBOA_HOST_NAME: ${APBOA_HOST_NAME}
      APBOA_HOST_IP: ${APBOA_HOST_IP}
      TZ: Asia/Shanghai
    volumes:
      - ${LOG_PATH:-./logs}/runtime:/app/logs
      - ${DATA_PATH:-./data}/.apboa:/app/.apboa
    ports:
      - "${RUNTIME_PORT:-3061}:3061"
    networks:
      - apboa_execute

  # ==================== Shell 执行代理（runner-proxy） ====================
  apboa-proxy:
    build:
      context: ..
      dockerfile: docker/proxy/Dockerfile
      args:
        MAVEN_IMAGE: ${DOCKER_REGISTRY}maven:3.9-eclipse-temurin-21
        JRE_IMAGE: ${DOCKER_REGISTRY}eclipse-temurin:21-jre
    container_name: apboa-proxy
    restart: unless-stopped
    # 安全加固：Shell 代理执行不可信命令，必须严格限制
    cap_drop:
      - ALL
    cap_add:
      - SETUID
      - SETGID
      - CHOWN
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp:exec
    working_dir: /tmp
    mem_limit: ${SHELLPROXY_MEM_LIMIT:-1g}
    cpus: ${SHELLPROXY_CPU_LIMIT:-2}
    pids_limit: ${SHELLPROXY_PIDS_LIMIT:-200}
    environment:
      SPRING_PROFILES_ACTIVE: docker
      JAVA_TOOL_OPTIONS: "-Djava.io.tmpdir=/tmp -Dspring.pid.file="
      CONSOLE_HOST: ${CONSOLE_HOST}
      SHELL_DEFAULT_TIMEOUT: ${SHELLPROXY_DEFAULT_TIMEOUT:-300}
      SHELL_MAX_TIMEOUT: ${SHELLPROXY_MAX_TIMEOUT:-3600}
      SHELL_MAX_OUTPUT_SIZE: ${SHELLPROXY_MAX_OUTPUT_SIZE:-52428800}
      SHELLPROXY_JAVA_HEAP_PERCENTAGE: ${SHELLPROXY_JAVA_HEAP_PERCENTAGE:-50.0}
      # 心跳标识：由 start-execute.sh 自动注入，同一节点的三个服务必须相同
      APBOA_NODE_ID: ${APBOA_NODE_ID}
      APBOA_HOST_NAME: ${APBOA_HOST_NAME}
      APBOA_HOST_IP: ${APBOA_HOST_IP}
      TZ: Asia/Shanghai
    volumes:
      - ${LOG_PATH:-./logs}/proxy:/app/logs
      - ${DATA_PATH:-./data}/.apboa:/app/.apboa
    networks:
      - apboa_execute

  # ==================== 文件同步服务（runner-file） ====================
  apboa-file:
    build:
      context: ..
      dockerfile: docker/file/Dockerfile
      args:
        MAVEN_IMAGE: ${DOCKER_REGISTRY}maven:3.9-eclipse-temurin-21
        JRE_IMAGE: ${DOCKER_REGISTRY}eclipse-temurin:21-jre
    container_name: apboa-file
    restart: unless-stopped
    cap_drop:
      - ALL
    cap_add:
      - SETUID
      - SETGID
      - CHOWN
    security_opt:
      - no-new-privileges:true
    mem_limit: ${FILE_MEM_LIMIT:-512m}
    cpus: ${FILE_CPU_LIMIT:-0.5}
    environment:
      SPRING_PROFILES_ACTIVE: docker
      MYSQL_HOST: ${MYSQL_HOST}
      MYSQL_PORT: ${MYSQL_PORT}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      REDIS_DATABASE: ${REDIS_DATABASE}
      CONSOLE_HOST: ${CONSOLE_HOST}
      FILE_JAVA_HEAP_PERCENTAGE: ${FILE_JAVA_HEAP_PERCENTAGE:-60.0}
      # 心跳标识：由 start-execute.sh 自动注入，同一节点的三个服务必须相同
      APBOA_NODE_ID: ${APBOA_NODE_ID}
      APBOA_HOST_NAME: ${APBOA_HOST_NAME}
      APBOA_HOST_IP: ${APBOA_HOST_IP}
      TZ: Asia/Shanghai
    volumes:
      - ${LOG_PATH:-./logs}/file:/app/logs
      - ${DATA_PATH:-./data}/.apboa:/app/.apboa
    networks:
      - apboa_execute

networks:
  apboa_execute:
    name: apboa_execute
    driver: bridge
