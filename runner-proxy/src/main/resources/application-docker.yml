# ============================================================
# Docker 环境配置（spring.profiles.active=docker）
# 所有值均从环境变量读取，由 docker-compose 注入
# ============================================================

server:
  port: 3062

spring:
  application:
    name: proxy
  main:
    banner-mode: off

shell:
  default-timeout: ${SHELL_DEFAULT_TIMEOUT:300}
  max-timeout: ${SHELL_MAX_TIMEOUT:3600}
  max-output-size: ${SHELL_MAX_OUTPUT_SIZE:52428800}
  log-command: false

logging:
  level:
    root: WARN
    com.hxh.apboa.shellproxy: INFO

# 心跳上报配置
heartbeat:
  enabled: true
  console-url: http://${CONSOLE_HOST:apboa-console}:3060
  service-type: PROXY
  port: ${server.port}
